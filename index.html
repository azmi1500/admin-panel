        * {

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1120 0%, #192132 100%);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(76, 130, 250, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(76, 130, 250, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            top: 0;
            left: 0;
            pointer-events: none;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Floating orbs */
        .orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(76, 130, 250, 0.4), rgba(76, 130, 250, 0));
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 { top: -100px; left: -100px; animation: float 15s ease-in-out infinite; }
        .orb-2 { bottom: -150px; right: -50px; width: 400px; height: 400px; 
                background: radial-gradient(circle at 30% 30%, rgba(0, 230, 200, 0.3), transparent);
                animation: float 20s ease-in-out infinite reverse; }
        .orb-3 { top: 50%; left: 50%; transform: translate(-50%, -50%);
                width: 600px; height: 600px;
                background: radial-gradient(circle at 30% 30%, rgba(156, 39, 176, 0.2), transparent);
                filter: blur(80px); }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(40px, 20px); }
        }

    <script>
        const API_URL = 'https://hawkerfinalv-production.up.railway.app/api';
        let adminToken = '';

        // Initialize date pickers
        function initDateTimePickers() {
            startPicker = flatpickr("#startDateTime", {
                enableTime: true,
                dateFormat: "Y-m-d H:i",
                time_24hr: true,
                minuteIncrement: 1,
                defaultDate: new Date(),

                        endPicker.set('minDate', selectedDates[0]);
                    }
                }
            });
            
            endPicker = flatpickr("#endDateTime", {

        // Test functions
       

        // Filter shops
        function filterShops() {
            const search = document.getElementById('searchShops').value.toLowerCase();
            const rows = document.querySelectorAll('#shopsTable tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(search) ? '' : 'none';
            });
        }

        // Format date
        function formatDate(isoString) {
            if (!isoString) return 'N/A';
            const clean = isoString.split('.')[0].replace('Z', '');
            const [datePart, timePart] = clean.split('T');
            const [year, month, day] = datePart.split('-');
            const [hours, minutes] = timePart.split(':');
            return `${day}/${month}/${year}, ${hours}:${minutes}`;
        }

        // Calculate time left
        function calculateTimeLeft(expiryString) {
            if (!expiryString) return { text: 'No License', class: '' };
            
            const clean = expiryString.split('.')[0].replace('Z', '');
            const [datePart, timePart] = clean.split('T');
            const [year, month, day] = datePart.split('-').map(Number);
            const [hours, minutes] = timePart.split(':').map(Number);
            
            const expiryDate = new Date(year, month-1, day, hours, minutes);
            const now = new Date();
            
            const diffMs = expiryDate - now;
            const diffMins = Math.floor(diffMs / (1000 * 60));
            
            if (diffMins < 0) return { text: 'Expired', class: 'status-expired' };
            if (diffMins < 60) return { text: `${diffMins} minutes`, class: 'status-warning' };
            if (diffMins < 1440) {
                const h = Math.floor(diffMins / 60);
                const m = diffMins % 60;
                return { text: `${h}h ${m}m`, class: 'status-warning' };
            }
            const d = Math.floor(diffMins / 1440);
            const h = Math.floor((diffMins % 1440) / 60);
            return { 
                text: `${d}d ${h}h`, 
                class: d < 7 ? 'status-warning' : 'status-active'
            };
        }

        // Update stats
        function updateStats(shops) {
            const total = shops.length;
            const active = shops.filter(s => {
                const timeLeft = calculateTimeLeft(s.ExpiryDate);
                return !timeLeft.text.includes('Expired') && !timeLeft.text.includes('No License');
            }).length;
            const expired = shops.filter(s => {
                const timeLeft = calculateTimeLeft(s.ExpiryDate);
                return timeLeft.text.includes('Expired');
            }).length;
            const expiring = shops.filter(s => {
                const timeLeft = calculateTimeLeft(s.ExpiryDate);
                return timeLeft.class === 'status-warning' && !timeLeft.text.includes('Expired');
            }).length;

            document.getElementById('totalShops').textContent = total;
            document.getElementById('activeShops').textContent = active;
            document.getElementById('expiredShops').textContent = expired;
            document.getElementById('expiringShops').textContent = expiring;
        }

// In your admin panel HTML, update the loadShops function

async function loadShops() {
    try {
        const res = await fetch(`${API_URL}/admin/shops?t=${Date.now()}`, {
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        const shops = await res.json();
        
        let html = '<table id="shopsTable"><thead><tr>';
        html += '<th>Shop</th><th>Role</th><th>Username</th><th>License Key</th><th>Start</th><th>Expiry</th><th>License Status</th><th>Time Left</th><th>User Status</th><th>Actions</th>';
        html += '</tr></thead><tbody>';
        
        let currentShop = '';
        let shopOwners = {};
        
        // First pass: collect owner license info
        shops.forEach(shop => {
            if (shop.Role === 'owner') {
                shopOwners[shop.ShopName] = {
                    licenseKey: shop.LicenseKey,
                    startDate: shop.StartDate,
                    expiryDate: shop.ExpiryDate,
                    licenseActive: shop.LicenseActive
                };
            }
        });
        
        shops.forEach(shop => {
            // Add shop separator if new shop
            if (currentShop !== shop.ShopName) {
                if (currentShop !== '') {
                    html += `<tr style="height: 5px;"><td colspan="10" style="padding: 0;"></td></tr>`;
                }
                html += `<tr style="background: rgba(76, 130, 250, 0.2);">
                    <td colspan="10" style="padding: 12px; font-weight: 700; color: #4A90E2;">
                        <i class="fas fa-store"></i> ${shop.ShopName || 'Unnamed Shop'}
                    </td>
                </tr>`;
                currentShop = shop.ShopName;
            }
            
            // Get owner license info for this shop
            const ownerInfo = shopOwners[shop.ShopName] || {};
            
            // ✅ FIX: For staff, use owner's start date
            const displayStartDate = (shop.Role === 'staff' && ownerInfo.startDate) 
                ? ownerInfo.startDate 
                : shop.StartDate;
            
            const displayExpiryDate = (shop.Role === 'staff' && ownerInfo.expiryDate) 
                ? ownerInfo.expiryDate 
                : shop.ExpiryDate;
            
            const displayLicenseKey = (shop.Role === 'staff' && ownerInfo.licenseKey) 
                ? ownerInfo.licenseKey 
                : shop.LicenseKey;
            
            const startDate = formatDate(displayStartDate);
            const expiryDate = formatDate(displayExpiryDate);
            const timeLeft = calculateTimeLeft(displayExpiryDate);
            
            const isUserActive = shop.UserActive === 1 || shop.UserActive === true;
            
            const roleIcon = shop.Role === 'owner' ? '👑' : '👤';
            const roleDisplay = shop.Role === 'owner' ? 'Owner' : 'Staff';
            
            const licenseDisplay = displayLicenseKey || 'No License';
            
            let licenseStatusClass = '';
            let licenseStatusText = 'Unknown';
            
            if (licenseDisplay === 'No License') {
                licenseStatusClass = 'status-expired';
                licenseStatusText = 'No License';
            } else if (timeLeft.text === 'Expired') {
                licenseStatusClass = 'status-expired';
                licenseStatusText = 'Expired';
            } else if (timeLeft.class === 'status-warning') {
                licenseStatusClass = 'status-warning';
                licenseStatusText = 'Expiring';
            } else {
                licenseStatusClass = 'status-active';
                licenseStatusText = 'Active';
            }
            
            html += `<tr>
                <td><strong>${shop.ShopName || '-'}</strong></td>
                <td>${roleIcon} ${roleDisplay}</td>
                <td>${shop.Username}</td>
                <td><span class="license-key">${licenseDisplay}</span></td>
                <td>${startDate}</td>  <!-- ✅ Now start date will show! -->
                <td>${expiryDate}</td>
                <td><span class="status-badge ${licenseStatusClass}">${licenseStatusText}</span></td>
                <td><span class="status-badge ${timeLeft.class}">${timeLeft.text}</span></td>
                <td><span class="status-badge ${isUserActive ? 'status-active' : 'status-expired'}">${isUserActive ? 'Active' : 'Inactive'}</span></td>
                <td>
                   <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                        <button class="action-btn ${isUserActive ? 'warning' : 'success'}" 
                                onclick="toggleUserStatus(${shop.Id}, ${!isUserActive})">
                            <i class="fas ${isUserActive ? 'fa-ban' : 'fa-check'}"></i>
                            ${isUserActive ? 'Deactivate' : 'Activate'}
                        </button>
                        
                        ${shop.Role === 'owner' ? `
                            <button class="renew-btn" onclick="showRenewModal(${shop.Id})">
                                <i class="fas fa-sync-alt"></i> Renew
                            </button>
                        ` : `
                            <span style="opacity: 0.5; padding: 8px 12px;">Staff</span>
                        `}
                        
                        <button class="action-btn danger" 
                                onclick="deleteUser(${shop.Id}, '${shop.ShopName}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </td>
            </tr>`;
        });
        
        html += '</tbody></table>';
        document.getElementById('shopsList').innerHTML = html;
        updateStats(shops);
        
    } catch (error) {
        console.error('❌ Error:', error);
        document.getElementById('shopsList').innerHTML = '<div class="error">Error loading shops</div>';
    }
}
// Toggle user active status
// Make sure loadShops is called after toggle
// In your HTML, update toggleUserStatus function

async function toggleUserStatus(userId, newStatus) {
    const action = newStatus ? 'activate' : 'deactivate';
    
    if (!confirm(`Are you sure you want to ${action} this user?`)) {
        return;
    }
    
    try {
        console.log(`🔄 Toggling user ${userId} to ${newStatus}`);
        
        const res = await fetch(`${API_URL}/admin/toggle-status/${userId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${adminToken}`
            },
            body: JSON.stringify({ isActive: newStatus })
        });
        
        const data = await res.json();
        console.log('📥 Toggle response:', data);
        
        if (res.ok) {
            alert(`✅ User ${action}d successfully!`);
            await loadShops(); // Reload table
        } else {
            alert('Error: ' + (data.error || data.message || 'Unknown error'));
        }
    } catch (error) {
        console.error('❌ Toggle error:', error);
        alert('Failed to update status: ' + error.message);
    }
}

// Delete user
async function deleteUser(userId, shopName) {
    if (!confirm(`⚠️ Are you sure you want to DELETE ${shopName}?\n\nThis will permanently remove the user and all associated data. This action cannot be undone!`)) {
        return;
    }
    
    try {
        const res = await fetch(`${API_URL}/admin/delete-user/${userId}`, {
            method: 'DELETE',
            headers: {
                'Authorization': `Bearer ${adminToken}`
            }
        });
        
        const data = await res.json();
        
        if (res.ok) {
            alert(`✅ User deleted successfully!`);
            loadShops(); // Reload table
        } else {
            alert('Error: ' + data.error);
        }
    } catch (error) {
        alert('Failed to delete user: ' + error.message);
    }
}

function togglePassword() {

    const eyeIcon = document.getElementById('eyeIcon');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.className = 'fas fa-eye-slash';

}

        function showRenewModal(userId) {
            document.getElementById('renewUserId').value = userId;
            document.getElementById('renewModal').style.display = 'flex';
            
            const now = new Date();
            
            renewStartPicker = flatpickr("#renewStartDateTime", {
